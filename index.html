<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>TradeON</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --brand: #00d672; --brand-hover: #00b862; --brand-soft: rgba(0,214,114,0.12); --brand-ink: #00301a;
  --up: #00d672; --up-soft: rgba(0,214,114,0.12);
  --down: #ff5c5c; --down-soft: rgba(255,92,92,0.12);
  --bg: #fafaf9; --bg-raised: #ffffff; --bg-sunken: #f4f4f3; --bg-hover: #efefee;
  --text: #0b0c0f; --text-soft: #3a3d45; --text-muted: #6b6f78;
  --border: #e6e6e3; --border-strong: #d4d4d0;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --shadow-sm:0 1px 2px rgba(10,11,13,0.04); --shadow-md:0 4px 12px rgba(10,11,13,0.06); --shadow-lg:0 12px 36px rgba(10,11,13,0.1);
  --font:'Inter',ui-sans-serif,system-ui,sans-serif; --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
[data-theme="dark"] {
  --bg:#0a0b0d; --bg-raised:#121317; --bg-sunken:#16181c; --bg-hover:#1d2026;
  --text:#f2f3f5; --text-soft:#c7c9d1; --text-muted:#8a8e99;
  --border:#22252b; --border-strong:#2d3138;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.4); --shadow-md:0 4px 12px rgba(0,0,0,0.5); --shadow-lg:0 12px 36px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;} html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4,h5{margin:0;letter-spacing:-0.02em;font-weight:600;}
h1{font-size:24px;font-weight:700;} h2{font-size:20px;} h3{font-size:16px;} h4{font-size:14px;font-weight:600;} p{margin:0;}
.num,.mono{font-variant-numeric:tabular-nums;} .mono{font-family:var(--font-mono);}
.up{color:var(--up);} .down{color:var(--down);} .muted{color:var(--text-muted);} .tiny{font-size:12px;color:var(--text-muted);} .brand{color:var(--brand);}
.row{display:flex;align-items:center;} .col{display:flex;flex-direction:column;}
.row.center{justify-content:center;} .row.between{justify-content:space-between;} .wrap{flex-wrap:wrap;}
.gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;} .gap-5{gap:20px;} .gap-6{gap:24px;}
.grow{flex:1;} .w-full{width:100%;}
.card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-md);}
.card-pad{padding:20px;} .card-pad-lg{padding:28px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid transparent;border-radius:var(--r-sm);font:inherit;font-weight:500;font-size:13px;cursor:pointer;transition:background .12s,border-color .12s;white-space:nowrap;text-decoration:none;}
.btn-primary{background:var(--brand);color:var(--brand-ink);font-weight:600;} .btn-primary:hover{background:var(--brand-hover);}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--border-strong);} .btn-ghost:hover{background:var(--bg-hover);}
.btn-subtle{background:var(--bg-sunken);color:var(--text);} .btn-subtle:hover{background:var(--bg-hover);}
.btn-danger{background:var(--down-soft);color:var(--down);} .btn-danger:hover{background:var(--down);color:#fff;}
.btn-icon{padding:6px;width:32px;height:32px;justify-content:center;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--text-soft);background:var(--bg-raised);cursor:pointer;white-space:nowrap;}
.chip-active{background:var(--text);color:var(--bg-raised);border-color:var(--text);}
.chip-up{background:var(--up-soft);color:var(--up);border-color:transparent;font-weight:600;}
.chip-down{background:var(--down-soft);color:var(--down);border-color:transparent;font-weight:600;}
input,select,textarea{width:100%;padding:9px 12px;font:inherit;font-size:14px;color:var(--text);background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:var(--r-sm);outline:none;transition:border-color .12s,box-shadow .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
select{cursor:pointer;}
.field-label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
.seg{display:inline-flex;background:var(--bg-sunken);border-radius:var(--r-sm);padding:3px;gap:2px;}
.seg-item{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;}
.seg-item.active{background:var(--bg-raised);color:var(--text);box-shadow:var(--shadow-sm);}
.table{width:100%;border-collapse:collapse;font-size:13px;}
.table thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);background:var(--bg-sunken);border-bottom:1px solid var(--border);}
.table tbody td{padding:11px 14px;border-bottom:1px solid var(--border);}
.table tbody tr:hover{background:var(--bg-sunken);}
.table tbody tr:last-child td{border-bottom:none;}
/* Shell */
.shell{min-height:100vh;display:grid;grid-template-columns:240px 1fr;background:var(--bg);}
.sidebar{border-right:1px solid var(--border);background:var(--bg-raised);padding:20px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo-row{display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:18px;}
.logo-row span{font-size:18px;font-weight:700;letter-spacing:-0.02em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;transition:background .1s,color .1s;}
.nav-item:hover{background:var(--bg-hover);color:var(--text);}
.nav-item.active{background:var(--bg-hover);color:var(--text);}
.nav-dot{width:5px;height:5px;border-radius:50%;background:transparent;margin-left:auto;flex-shrink:0;}
.nav-item.active .nav-dot{background:var(--brand);}
.nav-divider{height:1px;background:var(--border);margin:10px 4px;}
.sidebar-footer{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;}
.user-row:hover{background:var(--bg-hover);}
.avatar-xs{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#00301a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.topbar{position:sticky;top:0;z-index:10;background:rgba(250,250,249,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:12px;}
[data-theme="dark"] .topbar{background:rgba(10,11,13,.9);}
.page-wrap{padding:28px 32px;max-width:1300px;}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);}
.modal-lg{max-width:700px;}
/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
/* Auth */
.auth-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;}
.auth-card{width:100%;max-width:420px;}
/* Misc */
.divider{height:1px;background:var(--border);margin:20px 0;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-up{background:var(--up-soft);color:var(--up);}
.badge-down{background:var(--down-soft);color:var(--down);}
.badge-neutral{background:var(--bg-sunken);color:var(--text-muted);}
.badge-open{background:rgba(255,183,0,.12);color:#b37a00;}
[data-theme="dark"] .badge-open{color:#fbbf24;}
.star-row{display:flex;gap:4px;}
.star{font-size:16px;cursor:pointer;transition:transform .1s;}
.star:hover{transform:scale(1.2);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
textarea{resize:vertical;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:4px;box-shadow:var(--shadow-md);max-height:240px;overflow-y:auto;}
.autocomplete-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.autocomplete-item:hover,.autocomplete-item.sel{background:var(--bg-sunken);}
.pos-rel{position:relative;}
.text-right{text-align:right;}
.mt-1{margin-top:4px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;} .mt-5{margin-top:20px;} .mt-6{margin-top:24px;}
.mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;}
.p-3{padding:12px;} .p-4{padding:16px;}
.rounded{border-radius:var(--r-sm);} .rounded-md{border-radius:var(--r-md);}
.bg-sunken{background:var(--bg-sunken);}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cursor-pointer{cursor:pointer;}
.opacity-50{opacity:.5;}
.font-bold{font-weight:700;} .font-semibold{font-weight:600;} .font-medium{font-weight:500;}
.text-sm{font-size:13px;} .text-xs{font-size:12px;}
@media(max-width:768px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}.page-wrap{padding:16px;}.grid-4{grid-template-columns:1fr 1fr;}.grid-3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useContext,createContext,useRef} = React;

/* ===== STORAGE ===== */
const S = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

/* ===== FORMATTERS ===== */
const fmtCurrency=(n,cur='$')=>{if(n==null)return '-';const abs=Math.abs(n);const str=abs>=1000?abs.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}):abs.toFixed(2);return(n<0?'-':'')+cur+str;};
const fmtPct=(n)=>n==null?'-':(n>=0?'+':'')+n.toFixed(1)+'%';
const fmtDate=(d)=>d?new Date(d).toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric'}):'';
const fmtDateTime=(d)=>d?new Date(d).toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
const fmtShort=(d)=>d?new Date(d).toLocaleDateString('tr-TR',{day:'2-digit',month:'short'}):'';
const uid=()=>crypto.randomUUID();

/* ===== SYMBOLS ===== */
const SYMBOLS=[
  {s:'EUR/USD',n:'Euro/Dolar',t:'forex'},{s:'GBP/USD',n:'Sterlin/Dolar',t:'forex'},{s:'USD/JPY',n:'Dolar/Yen',t:'forex'},
  {s:'USD/TRY',n:'Dolar/TL',t:'forex'},{s:'EUR/TRY',n:'Euro/TL',t:'forex'},{s:'GBP/TRY',n:'Sterlin/TL',t:'forex'},
  {s:'AUD/USD',n:'Avustralya/Dolar',t:'forex'},{s:'USD/CAD',n:'Dolar/Kanada',t:'forex'},{s:'USD/CHF',n:'Dolar/Frank',t:'forex'},
  {s:'NZD/USD',n:'YeniZelanda/Dolar',t:'forex'},{s:'EUR/GBP',n:'Euro/Sterlin',t:'forex'},{s:'XAU/USD',n:'Altın',t:'emtia'},
  {s:'XAG/USD',n:'Gümüş',t:'emtia'},{s:'WTI',n:'Ham Petrol',t:'emtia'},{s:'BRENT',n:'Brent Petrol',t:'emtia'},
  {s:'BTC/USDT',n:'Bitcoin',t:'kripto'},{s:'ETH/USDT',n:'Ethereum',t:'kripto'},{s:'BNB/USDT',n:'BNB',t:'kripto'},
  {s:'SOL/USDT',n:'Solana',t:'kripto'},{s:'XRP/USDT',n:'Ripple',t:'kripto'},{s:'DOGE/USDT',n:'Dogecoin',t:'kripto'},
  {s:'ADA/USDT',n:'Cardano',t:'kripto'},{s:'AVAX/USDT',n:'Avalanche',t:'kripto'},{s:'MATIC/USDT',n:'Polygon',t:'kripto'},
  {s:'AAPL',n:'Apple',t:'hisse'},{s:'MSFT',n:'Microsoft',t:'hisse'},{s:'GOOGL',n:'Alphabet',t:'hisse'},
  {s:'AMZN',n:'Amazon',t:'hisse'},{s:'TSLA',n:'Tesla',t:'hisse'},{s:'NVDA',n:'Nvidia',t:'hisse'},
  {s:'META',n:'Meta',t:'hisse'},{s:'THYAO',n:'Türk Hava Yolları',t:'hisse'},{s:'GARAN',n:'Garanti BBVA',t:'hisse'},
  {s:'ASELS',n:'Aselsan',t:'hisse'},{s:'SASA',n:'Sasa Polyester',t:'hisse'},
  {s:'NAS100',n:'Nasdaq 100',t:'endeks'},{s:'SPX500',n:'S&P 500',t:'endeks'},{s:'US30',n:'Dow Jones',t:'endeks'},
  {s:'GER40',n:'DAX 40',t:'endeks'},{s:'UK100',n:'FTSE 100',t:'endeks'},{s:'XU100',n:'BIST 100',t:'endeks'},
];
const searchSymbols=(q)=>q.length<1?[]:SYMBOLS.filter(s=>s.s.toLowerCase().includes(q.toLowerCase())||s.n.toLowerCase().includes(q.toLowerCase())).slice(0,8);

/* ===== AUTH CONTEXT ===== */
const AuthCtx=createContext(null);
function AuthProvider({children}){
  const [user,setUser]=useState(()=>S.get('tradeon_user'));
  const login=(email,password)=>{
    const users=S.get('tradeon_users',[]);
    const u=users.find(u=>u.email===email&&u.password===password);
    if(!u)return{error:'E-posta veya şifre hatalı.'};
    setUser(u);S.set('tradeon_user',u);return{ok:true};
  };
  const register=(displayName,email,password,extra={})=>{
    const users=S.get('tradeon_users',[]);
    if(users.find(u=>u.email===email))return{error:'Bu e-posta zaten kayıtlı.'};
    const u={id:uid(),displayName,email,password,birthDate:extra.birthDate||null,country:extra.country||null,createdAt:new Date().toISOString(),settings:{startingBalance:10000,currency:'USD',darkMode:false}};
    S.set('tradeon_users',[...users,u]);
    setUser(u);S.set('tradeon_user',u);return{ok:true};
  };
  const checkEmailAvailable=(email)=>{
    const users=S.get('tradeon_users',[]);
    return !users.find(u=>u.email===email);
  };
  const logout=()=>{setUser(null);S.set('tradeon_user',null);};
  const updateUser=(updates)=>{
    const u2={...user,...updates,settings:{...user.settings,...(updates.settings||{})}};
    setUser(u2);S.set('tradeon_user',u2);
    const users=S.get('tradeon_users',[]);
    S.set('tradeon_users',users.map(u=>u.id===u2.id?u2:u));
  };
  return <AuthCtx.Provider value={{user,login,register,logout,updateUser,checkEmailAvailable}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

/* ===== TRADE CONTEXT ===== */
const TradeCtx=createContext(null);
function TradeProvider({children}){
  const {user}=useAuth();
  const uid2=user?.id;
  const [trades,setTrades]=useState([]);
  const [accounts,setAccounts]=useState([]);
  const [transactions,setTransactions]=useState([]);
  const [activeAccId,setActiveAccId]=useState(null);

  useEffect(()=>{
    if(uid2){
      setTrades(S.get(`trades_${uid2}`,[]) );
      setAccounts(S.get(`accounts_${uid2}`,[]) );
      setTransactions(S.get(`txns_${uid2}`,[]) );
    } else {
      setTrades([]);setAccounts([]);setTransactions([]);
    }
  },[uid2]);

  const saveTrades=useCallback((t)=>{setTrades(t);S.set(`trades_${uid2}`,t);},[uid2]);
  const saveAccounts=useCallback((a)=>{setAccounts(a);S.set(`accounts_${uid2}`,a);},[uid2]);
  const saveTxns=useCallback((t)=>{setTransactions(t);S.set(`txns_${uid2}`,t);},[uid2]);

  const calcPnL=(t)=>{
    if(!t.exitPrice)return{pnl:null,pnlPct:null};
    const mult=t.direction==='long'?1:-1;
    const pnl=(t.exitPrice-t.entryPrice)*t.quantity*mult-(t.commission||0);
    const pnlPct=(pnl/(t.entryPrice*t.quantity))*100;
    return{pnl,pnlPct};
  };

  const addTrade=useCallback((data)=>{
    const now=new Date().toISOString();
    const t={...data,id:uid(),userId:uid2,createdAt:now,updatedAt:now,accountId:data.accountId||null,...calcPnL(data),status:data.exitPrice?'kapali':'acik'};
    const next=[t,...trades];saveTrades(next);return t;
  },[trades,saveTrades,uid2]);

  const updateTrade=useCallback((id,updates)=>{
    const next=trades.map(t=>{
      if(t.id!==id)return t;
      const u={...t,...updates,updatedAt:new Date().toISOString()};
      return{...u,...calcPnL(u),status:u.exitPrice?'kapali':'acik'};
    });saveTrades(next);
  },[trades,saveTrades]);

  const deleteTrade=useCallback((id)=>saveTrades(trades.filter(t=>t.id!==id)),[trades,saveTrades]);

  const addAccount=useCallback((data)=>{
    const a={...data,id:uid(),userId:uid2,createdAt:new Date().toISOString()};
    saveAccounts([...accounts,a]);return a;
  },[accounts,saveAccounts,uid2]);

  const deleteAccount=useCallback((id)=>{
    saveAccounts(accounts.filter(a=>a.id!==id));
    saveTrades(trades.map(t=>t.accountId===id?{...t,accountId:null}:t));
    saveTxns(transactions.map(t=>t.accountId===id?{...t,accountId:null}:t));
    if(activeAccId===id)setActiveAccId(null);
  },[accounts,trades,transactions,saveAccounts,saveTrades,saveTxns,activeAccId]);

  const addTransaction=useCallback((data)=>{
    const t={...data,id:uid(),userId:uid2,createdAt:new Date().toISOString(),accountId:data.accountId||null};
    saveTxns([t,...transactions]);
  },[transactions,saveTxns,uid2]);

  const deleteTransaction=useCallback((id)=>saveTxns(transactions.filter(t=>t.id!==id)),[transactions,saveTxns]);

  const filteredTrades=useMemo(()=>activeAccId?trades.filter(t=>t.accountId===activeAccId):trades,[trades,activeAccId]);
  const filteredTxns=useMemo(()=>activeAccId?transactions.filter(t=>t.accountId===activeAccId):transactions,[transactions,activeAccId]);

  const netTxns=useCallback((accId)=>{
    const txs=accId?transactions.filter(t=>t.accountId===accId):filteredTxns;
    return txs.reduce((s,t)=>s+(t.type==='deposit'?t.amount:-t.amount),0);
  },[transactions,filteredTxns]);

  return <TradeCtx.Provider value={{trades,filteredTrades,accounts,transactions,filteredTxns,activeAccId,setActiveAccId,addTrade,updateTrade,deleteTrade,addAccount,deleteAccount,addTransaction,deleteTransaction,netTxns}}>
    {children}
  </TradeCtx.Provider>;
}
const useTrades=()=>useContext(TradeCtx);

/* ===== ICONS ===== */
const Ic={
  panel:(s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  trades:(s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>,
  perf:(s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M2.25 18L9 11.25l4.3 4.3a12 12 0 015.8-5.5l2.7-1.2"/><path d="M15.75 7.5l3.75-1.5-1.5 3.75"/></svg>,

/* ===== MINI SVG CHARTS ===== */
function LineChart({data,w=300,h=80,color='var(--brand)',fill=true}){
  if(!data||data.length<2)return <div style={{height:h,display:'flex',alignItems:'center',justifyContent:'center'}}><span className="tiny muted">Veri yok</span></div>;
  const min=Math.min(...data);const max=Math.max(...data);const range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-min)/range)*(h-8)-4;
    return`${x},${y}`;
  }).join(' ');
  const fillPts=`0,${h} ${pts} ${w},${h}`;
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    {fill&&<polygon points={fillPts} fill="url(#lg)"/>}
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function BarChart({data,w=300,h=80}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>Math.abs(d.v)));
  const bw=Math.floor(w/data.length)-2;
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}>
    {data.map((d,i)=>{
      const bh=Math.max(2,(Math.abs(d.v)/max)*(h/2-2));
      const x=i*(bw+2);
      const y=d.v>=0?h/2-bh:h/2;
      return <rect key={i} x={x} y={y} width={bw} height={bh} fill={d.v>=0?'var(--up)':'var(--down)'} rx="2"/>;
    })}
    <line x1="0" y1={h/2} x2={w} y2={h/2} stroke="var(--border)" strokeWidth="1"/>
  </svg>;
}

function DonutChart({segments,size=80}){
  const total=segments.reduce((s,g)=>s+g.v,0);
  if(!total)return null;
  let angle=-Math.PI/2;
  const r=size/2-6;const cx=size/2;const cy=size/2;
  const paths=segments.map(seg=>{
    const a=(seg.v/total)*Math.PI*2;
    const x1=cx+r*Math.cos(angle);const y1=cy+r*Math.sin(angle);
    angle+=a;
    const x2=cx+r*Math.cos(angle);const y2=cy+r*Math.sin(angle);
    const large=a>Math.PI?1:0;
    const d=`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    return<path key={seg.label} d={d} fill={seg.color}/>;
  });
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
    <circle cx={cx} cy={cy} r={r} fill="var(--bg-sunken)"/>
    {paths}
    <circle cx={cx} cy={cy} r={r*0.55} fill="var(--bg-raised)"/>
  </svg>;
}

function RegisterPage({onSwitch}){
  const {register,checkEmailAvailable}=useAuth();
  const [step,setStep]=useState('form'); // 'form' | 'otp'
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [birthDate,setBirthDate]=useState('');
  const [country,setCountry]=useState('Türkiye');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [sentCode,setSentCode]=useState(null);
  const [codeExpiry,setCodeExpiry]=useState(0);
  const [enteredCode,setEnteredCode]=useState('');
  const [resendCooldown,setResendCooldown]=useState(0);

  useEffect(()=>{
    if(resendCooldown<=0)return;
    const t=setTimeout(()=>setResendCooldown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[resendCooldown]);

  const sendOtpEmail=async(targetEmail)=>{
    const code=String(Math.floor(100000+Math.random()*900000));
    try{
      const r=await fetch('/api/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:targetEmail,code})});
      if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Gönderim hatası');}
      setSentCode(code);
      setCodeExpiry(Date.now()+10*60*1000);
      return{ok:true};
    }catch(e){return{error:e.message||'E-posta gönderilemedi.'};}
  };

  const submitForm=async(e)=>{
    e.preventDefault();setErr('');
    if(!name.trim()){setErr('İsim zorunlu.');return;}
    if(pw.length<6){setErr('Şifre en az 6 karakter olmalı.');return;}
    if(!birthDate){setErr('Doğum tarihi zorunlu.');return;}
    if(!checkEmailAvailable(email)){setErr('Bu e-posta zaten kayıtlı.');return;}
    setBusy(true);
    const r=await sendOtpEmail(email);
    setBusy(false);
    if(r.error){setErr(r.error);return;}
    setStep('otp');
    setResendCooldown(60);
  };

  const submitOtp=(e)=>{
    e.preventDefault();setErr('');
    if(Date.now()>codeExpiry){setErr('Kodun süresi doldu. Yeni kod iste.');return;}
    if(enteredCode.trim()!==sentCode){setErr('Doğrulama kodu hatalı.');return;}
    const r=register(name,email,pw,{birthDate,country});
    if(r.error)setErr(r.error);
  };

  const resendCode=async()=>{
    if(resendCooldown>0)return;
    setBusy(true);setErr('');
    const r=await sendOtpEmail(email);
    setBusy(false);
    if(r.error){setErr(r.error);return;}
    setEnteredCode('');
    setResendCooldown(60);
  };

  return <div className="auth-shell">
    <div className="auth-card">
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,marginBottom:8}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" strokeWidth="2" strokeLinecap="round"><path d="M2.25 18L9 11.25l4.3 4.3a12 12 0 015.8-5.5l2.7-1.2"/><path d="M15.75 7.5l3.75-1.5-1.5 3.75"/></svg>
          <h1 style={{fontSize:26}}>TradeON</h1>
        </div>
        <p className="muted" style={{fontSize:13}}>Profesyonel Trading Günlüğü</p>
      </div>
      <div className="card card-pad-lg">
        {step==='form'?<>
          <h2 style={{marginBottom:6}}>Hesap Oluştur</h2>
          <p className="tiny muted" style={{marginBottom:20}}>Ücretsiz, 30 saniye sürer.</p>
          {err&&<div style={{background:'var(--down-soft)',color:'var(--down)',padding:'10px 14px',borderRadius:'var(--r-sm)',marginBottom:16,fontSize:13}}>{err}</div>}
          <form onSubmit={submitForm} className="col gap-4">
            <div><label className="field-label">İsim Soyisim</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Adın Soyadın" required/></div>
            <div><label className="field-label">E-posta</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ornek@email.com" required/></div>
            <div><label className="field-label">Şifre</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="En az 6 karakter" required/></div>
            <div className="grid-2">
              <div><label className="field-label">Doğum Tarihi</label><input type="date" value={birthDate} onChange={e=>setBirthDate(e.target.value)} required max={new Date().toISOString().slice(0,10)}/></div>
              <div><label className="field-label">Ülke</label>
                <select value={country} onChange={e=>setCountry(e.target.value)}>
                  {COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <button type="submit" className="btn btn-primary w-full" style={{justifyContent:'center',padding:'11px'}} disabled={busy}>{busy?'Kod gönderiliyor...':'Devam Et'}</button>
          </form>
          <p style={{textAlign:'center',marginTop:16,fontSize:13,color:'var(--text-muted)'}}>Hesabın var mı? <span className="brand cursor-pointer" onClick={onSwitch} style={{fontWeight:600}}>Giriş Yap</span></p>
        </>:<>
          <h2 style={{marginBottom:6}}>E-postanı Doğrula</h2>
          <p className="tiny muted" style={{marginBottom:20}}><span style={{fontWeight:600,color:'var(--text)'}}>{email}</span> adresine 6 haneli kod gönderdik.</p>
          {err&&<div style={{background:'var(--down-soft)',color:'var(--down)',padding:'10px 14px',borderRadius:'var(--r-sm)',marginBottom:16,fontSize:13}}>{err}</div>}
          <form onSubmit={submitOtp} className="col gap-4">
            <div>
              <label className="field-label">Doğrulama Kodu</label>
              <input value={enteredCode} onChange={e=>setEnteredCode(e.target.value.replace(/\D/g,'').slice(0,6))} placeholder="000000" maxLength={6}
                style={{textAlign:'center',fontSize:24,letterSpacing:8,fontWeight:600,fontFamily:'var(--font-mono)'}}/>
            </div>
            <button type="submit" className="btn btn-primary w-full" style={{justifyContent:'center',padding:'11px'}} disabled={enteredCode.length!==6}>Doğrula ve Hesap Oluştur</button>
          </form>
          <div className="row between mt-4">
            <span className="tiny muted cursor-pointer" onClick={()=>{setStep('form');setEnteredCode('');setErr('');}}>← Bilgileri düzenle</span>
            {resendCooldown>0?<span className="tiny muted">Tekrar gönder ({resendCooldown}sn)</span>:<span className="brand cursor-pointer tiny" onClick={resendCode} style={{fontWeight:600}}>{busy?'Gönderiliyor...':'Kodu Tekrar Gönder'}</span>}
          </div>
        </>}
      </div>
    </div>
  </div>;
}

/* ===== SYMBOL AUTOCOMPLETE INPUT ===== */
function SymbolInput({value,onChange,onSelect}){
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(-1);
  const results=useMemo(()=>searchSymbols(value),[value]);
  const ref=useRef(null);
  useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const pick=(s)=>{onChange(s.s);onSelect&&onSelect(s);setOpen(false);setSel(-1);};
  const kd=(e)=>{
    if(!open)return;
    if(e.key==='ArrowDown'){e.preventDefault();setSel(p=>Math.min(p+1,results.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(p=>Math.max(p-1,0));}
    else if(e.key==='Enter'&&sel>=0){e.preventDefault();pick(results[sel]);}
    else if(e.key==='Escape')setOpen(false);
  };
  const typeLabels={forex:'Forex',kripto:'Kripto',hisse:'Hisse',emtia:'Emtia',endeks:'Endeks'};
  return <div className="pos-rel" ref={ref}>
    <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);setSel(-1);}} onFocus={()=>value&&setOpen(true)} onKeyDown={kd} placeholder="EUR/USD, BTC..." style={{textTransform:'uppercase'}} autoComplete="off"/>
    {open&&results.length>0&&<div className="autocomplete-list">
      {results.map((s,i)=><div key={s.s} className={`autocomplete-item ${i===sel?'sel':''}`} onMouseDown={()=>pick(s)}>
        <div className="row gap-2"><span style={{fontWeight:600,fontFamily:'var(--font-mono)',fontSize:13}}>{s.s}</span><span className="muted" style={{fontSize:12}}>{s.n}</span></div>
        <span className="chip" style={{fontSize:11,padding:'1px 7px'}}>{typeLabels[s.t]||s.t}</span>
      </div>)}
    </div>}
  </div>;
}

  const [newAccType,setNewAccType]=useState('kisisel');
  const [newAccBal,setNewAccBal]=useState('');
  const [delAccId,setDelAccId]=useState(null);
  const [showTxList,setShowTxList]=useState(false);

  const closed=filteredTrades.filter(t=>t.status==='kapali');
  const totalPnL=closed.reduce((s,t)=>s+(t.pnl||0),0);
  const startBal=activeAccId?(accounts.find(a=>a.id===activeAccId)?.balance||0):(user?.settings?.startingBalance||10000);
  const net=netTxns(activeAccId);
  const currentBal=startBal+totalPnL+net;
  const winCount=closed.filter(t=>(t.pnl||0)>0).length;
  const winRate=closed.length?((winCount/closed.length)*100):0;
  const grossW=closed.filter(t=>(t.pnl||0)>0).reduce((s,t)=>s+(t.pnl||0),0);
  const grossL=Math.abs(closed.filter(t=>(t.pnl||0)<0).reduce((s,t)=>s+(t.pnl||0),0));
  const pf=grossL?grossW/grossL:grossW>0?Infinity:0;
  const thisMonthPnL=closed.filter(t=>{const d=new Date(t.exitDate||t.createdAt);const n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).reduce((s,t)=>s+(t.pnl||0),0);

  // Equity curve data
  const equityData=useMemo(()=>{
    const sorted=[...closed].sort((a,b)=>new Date(a.exitDate||a.createdAt)-new Date(b.exitDate||b.createdAt));
    let cum=startBal;
    return sorted.map(t=>{cum+=t.pnl||0;return cum;});
  },[closed,startBal]);

  // Daily PnL
  const dailyData=useMemo(()=>{
    const map={};
    closed.forEach(t=>{
      const d=new Date(t.exitDate||t.createdAt).toLocaleDateString('tr-TR');
      map[d]=(map[d]||0)+(t.pnl||0);
    });
    return Object.entries(map).slice(-20).map(([,v])=>({v}));
  },[closed]);

  const recentTrades=filteredTrades.slice(0,8);

  const submitTx=()=>{
    const a=parseFloat(txAmt);
    if(!a||a<=0)return;
    addTransaction({type:txType,amount:a,note:txNote,date:new Date().toISOString(),accountId:activeAccId});
    setTxAmt('');setTxNote('');setShowTx(false);
  };

  const submitNewAcc=()=>{
    if(!newAccName.trim())return;
    addAccount({name:newAccName,type:newAccType,balance:parseFloat(newAccBal)||0,currency:'USD',color:ACC_COLORS[accounts.length%ACC_COLORS.length]});
    setNewAccName('');setNewAccBal('');setShowNewAcc(false);
  };

  return <div>
    <div className="topbar row between">
      <h2 style={{fontSize:18}}>Genel Bakış</h2>
      <div className="row gap-2">
        <button className="btn btn-ghost" onClick={()=>{setTxType('deposit');setShowTx(true);}}>{Ic.deposit(14)} Para Ekle</button>
        <button className="btn btn-ghost" onClick={()=>{setTxType('withdrawal');setShowTx(true);}}>{Ic.withdraw(14)} Para Çek</button>
        <button className="btn btn-primary" onClick={()=>setPage('new-trade')}>{Ic.plus(14)} Yeni İşlem</button>
      </div>
    </div>
    <div className="page-wrap col gap-4">

      {/* Accounts bar */}
      <div className="card card-pad">
        <div className="row between mb-3">
          <h4>Hesaplar</h4>
          <div className="row gap-2">
            <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>setShowTxList(true)}>İşlem Geçmişi</button>
            <button className="btn btn-subtle brand" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>setShowNewAcc(true)}>{Ic.plus(13)} Yeni Hesap</button>
          </div>
        </div>
        <div className="row gap-2 wrap mb-4">
          <span className={`chip ${!activeAccId?'chip-active':''}`} onClick={()=>setActiveAccId(null)}>Tüm Hesaplar</span>
          {accounts.map(a=><span key={a.id} className={`chip ${activeAccId===a.id?'chip-active':''}`} onClick={()=>setActiveAccId(activeAccId===a.id?null:a.id)}>
            <span style={{width:6,height:6,background:a.color,borderRadius:'50%',display:'inline-block'}}/>{a.name}
          </span>)}
        </div>
        {accounts.length>0&&<div className="row gap-3 wrap">
          {(activeAccId?accounts.filter(a=>a.id===activeAccId):accounts).map(acc=>{
            const accTrades=filteredTrades.filter(t=>t.accountId===acc.id&&t.status==='kapali');
            const accPnL=accTrades.reduce((s,t)=>s+(t.pnl||0),0);
            const accNet=netTxns(acc.id);
            const accBal=acc.balance+accPnL+accNet;
            const pct=acc.balance?((accBal-acc.balance)/acc.balance)*100:0;
            return <div key={acc.id} className="grow card" style={{padding:16,minWidth:180,position:'relative'}}>
              <button className="btn btn-icon" style={{position:'absolute',top:8,right:8,opacity:.4}} onClick={()=>setDelAccId(acc.id)}>{Ic.trash(13)}</button>
              <div className="row gap-2 mb-2"><span style={{width:8,height:8,background:acc.color,borderRadius:'50%',display:'inline-block'}}/><span className="tiny">{acc.name} · {ACC_TYPES[acc.type]||acc.type}</span></div>
              <div className="num font-bold" style={{fontSize:22}}>{fmtCurrency(accBal)}</div>
              <Change v={accPnL} pct={pct}/>
            </div>;
          })}
        </div>}
        {accounts.length===0&&<div className="row center" style={{padding:'16px 0',color:'var(--text-muted)',fontSize:13}}>Henüz hesap eklenmedi. Yukarıdan ekleyebilirsin.</div>}
      </div>

      {/* KPI Cards */}
      <div className="grid-4">
        {[
          {label:'Toplam Bakiye',val:fmtCurrency(currentBal),sub:`Başlangıç: ${fmtCurrency(startBal)}`,pnl:totalPnL},
          {label:'Bu Ay K/Z',val:fmtCurrency(thisMonthPnL),sub:`${closed.length} kapalı işlem`,pnl:thisMonthPnL},
          {label:'Başarı Oranı',val:`%${winRate.toFixed(1)}`,sub:`${winCount}K / ${closed.length-winCount}Z`,pnl:winRate-50},
          {label:'Profit Factor',val:pf===Infinity?'∞':pf.toFixed(2),sub:`Brüt K: ${fmtCurrency(grossW)}`,pnl:pf-1},
        ].map((k,i)=><div key={i} className="card card-pad">
          <div className="tiny mb-2">{k.label}</div>
          <div className="num font-bold" style={{fontSize:22,color:k.pnl>=0?'var(--up)':'var(--down)'}}>{k.val}</div>
          <div className="tiny mt-1">{k.sub}</div>
        </div>)}
      </div>

      {/* Charts row */}
      <div className="grid-2" style={{gridTemplateColumns:'2fr 1fr'}}>
        <div className="card card-pad">
          <div className="row between mb-3"><h4>Özsermaye Eğrisi</h4><span className="tiny">{fmtCurrency(currentBal)}</span></div>
          <LineChart data={equityData} w={500} h={120} color="var(--brand)"/>
        </div>
        <div className="card card-pad">
          <div className="row between mb-3"><h4>Günlük K/Z</h4></div>
          <BarChart data={dailyData} w={220} h={120}/>
        </div>
      </div>

      {/* Win/Loss + Asset Distribution */}
      <div className="grid-2">
        <div className="card card-pad">
          <h4 className="mb-3">Kazanç / Kayıp Dağılımı</h4>
          {closed.length>0?<div className="row gap-4">
            <DonutChart segments={[{label:'K',v:winCount,color:'var(--up)'},{label:'Z',v:closed.length-winCount,color:'var(--down)'}]} size={90}/>
            <div className="col gap-2">
              <div className="row gap-2"><span style={{width:8,height:8,background:'var(--up)',borderRadius:2,flexShrink:0}}/><span className="tiny">Kazanç: {winCount} (%{winRate.toFixed(0)})</span></div>
              <div className="row gap-2"><span style={{width:8,height:8,background:'var(--down)',borderRadius:2,flexShrink:0}}/><span className="tiny">Kayıp: {closed.length-winCount} (%{(100-winRate).toFixed(0)})</span></div>
            </div>
          </div>:<div className="tiny muted">Veri yok</div>}
        </div>
        <div className="card card-pad">
          <h4 className="mb-3">Varlık Dağılımı</h4>
          {(()=>{
            const map={};
            filteredTrades.forEach(t=>map[t.assetType]=(map[t.assetType]||0)+1);
            const colors=['var(--brand)','#5aa9ff','#f59e0b','#a78bfa','#f97316'];
            const segs=Object.entries(map).map(([k,v],i)=>({label:k,v,color:colors[i%colors.length]}));
            return segs.length>0?<div className="row gap-4">
              <DonutChart segments={segs} size={90}/>
              <div className="col gap-2">
                {segs.map((s,i)=><div key={s.label} className="row gap-2"><span style={{width:8,height:8,background:s.color,borderRadius:2,flexShrink:0}}/><span className="tiny">{s.label}: {s.v}</span></div>)}
              </div>
            </div>:<div className="tiny muted">Veri yok</div>;
          })()}
        </div>
      </div>

      {/* Recent Trades */}
      <div className="card">
        <div className="row between" style={{padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
          <h4>Son İşlemler</h4>
          <button className="btn btn-subtle" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>setPage('trades')}>Tümünü Gör</button>
        </div>
        <table className="table">
          <thead><tr><th>Sembol</th><th>Yön</th><th>Giriş</th><th>Çıkış</th><th>K/Z</th><th>Durum</th></tr></thead>
          <tbody>
            {recentTrades.length===0?<tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'var(--text-muted)'}}>Henüz işlem yok. <span className="brand cursor-pointer" onClick={()=>setPage('new-trade')}>Yeni işlem ekle →</span></td></tr>:
            recentTrades.map(t=><tr key={t.id}>
              <td><span style={{fontWeight:600}}>{t.symbol}</span><span className="tiny muted" style={{marginLeft:6}}>{t.assetType}</span></td>
              <td><span className={`chip ${t.direction==='long'?'chip-up':'chip-down'}`} style={{fontSize:11}}>{t.direction==='long'?'↑ Long':'↓ Short'}</span></td>
              <td className="num">{t.entryPrice?.toFixed(4)}</td>
              <td className="num">{t.exitPrice?.toFixed(4)||'-'}</td>
              <td className={`num font-semibold ${(t.pnl||0)>=0?'up':'down'}`}>{t.pnl!=null?((t.pnl>=0?'+':'')+fmtCurrency(t.pnl)):'-'}</td>
              <td><span className={`badge ${t.status==='acik'?'badge-open':'badge-neutral'}`}>{t.status==='acik'?'Açık':'Kapalı'}</span></td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>

    {/* Transaction Modal */}
    {showTx&&<Modal title={txType==='deposit'?'Para Ekle':'Para Çek'} onClose={()=>setShowTx(false)}>
      <div className="col gap-4">
        <div className="seg" style={{width:'100%'}}>
          <div className={`seg-item ${txType==='deposit'?'active':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setTxType('deposit')}>Para Ekle</div>
          <div className={`seg-item ${txType==='withdrawal'?'active':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setTxType('withdrawal')}>Para Çek</div>
        </div>
        <div><label className="field-label">Miktar (USD)</label><input type="number" value={txAmt} onChange={e=>setTxAmt(e.target.value)} placeholder="0.00" min="0" step="any"/></div>
        <div><label className="field-label">Not (opsiyonel)</label><input value={txNote} onChange={e=>setTxNote(e.target.value)} placeholder="Açıklama..."/></div>
        <div className="row gap-2" style={{justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={()=>setShowTx(false)}>İptal</button>
          <button className="btn btn-primary" onClick={submitTx}>Onayla</button>
        </div>
      </div>
    </Modal>}

    {/* New Account Modal */}
    {showNewAcc&&<Modal title="Yeni Hesap Ekle" onClose={()=>setShowNewAcc(false)}>
      <div className="col gap-4">
        <div><label className="field-label">Hesap Adı *</label><input value={newAccName} onChange={e=>setNewAccName(e.target.value)} placeholder="FTMO 100K, Binance..."/></div>
        <div><label className="field-label">Hesap Türü</label>
          <select value={newAccType} onChange={e=>setNewAccType(e.target.value)}>
            {Object.entries(ACC_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div><label className="field-label">Başlangıç Bakiyesi (USD)</label><input type="number" value={newAccBal} onChange={e=>setNewAccBal(e.target.value)} placeholder="10000"/></div>
        <div className="row gap-2" style={{justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={()=>setShowNewAcc(false)}>İptal</button>
          <button className="btn btn-primary" onClick={submitNewAcc}>Hesap Oluştur</button>
        </div>
      </div>
    </Modal>}

    {/* Delete Account Modal */}
    {delAccId&&<Modal title="Hesabı Sil" onClose={()=>setDelAccId(null)}>
      <p style={{color:'var(--text-soft)',marginBottom:20}}>Bu hesabı silmek istediğinden emin misin? Bu hesaba bağlı işlemler silinmez, sadece hesap bağlantısı kaldırılır.</p>
      <div className="row gap-2" style={{justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={()=>setDelAccId(null)}>İptal</button>
        <button className="btn btn-danger" onClick={()=>{deleteAccount(delAccId);setDelAccId(null);}}>Sil</button>
      </div>
    </Modal>}

    {/* Transaction List Modal */}
    {showTxList&&<Modal title="İşlem Geçmişi" onClose={()=>setShowTxList(false)} lg>
      {filteredTxns.length===0?<div className="tiny muted" style={{textAlign:'center',padding:24}}>İşlem yok.</div>:
      <table className="table">
        <thead><tr><th>Tarih</th><th>Tür</th><th>Miktar</th><th>Not</th><th></th></tr></thead>
        <tbody>
          {filteredTxns.map(t=><tr key={t.id}>
            <td className="tiny">{fmtDate(t.createdAt)}</td>
            <td><span className={`badge ${t.type==='deposit'?'badge-up':'badge-down'}`}>{t.type==='deposit'?'Para Ekle':'Para Çek'}</span></td>
            <td className="num font-semibold">{fmtCurrency(t.amount)}</td>
            <td className="muted">{t.note||'-'}</td>
            <td><button className="btn btn-icon" style={{opacity:.5}} onClick={()=>deleteTransaction(t.id)}>{Ic.trash(13)}</button></td>
          </tr>)}
        </tbody>
      </table>}
    </Modal>}
  </div>;
}

/* ===== NEW TRADE PAGE ===== */
function NewTradePage({setPage,editTrade=null}){
  const {accounts,activeAccId,addTrade,updateTrade}=useTrades();
  const assetTypes={forex:'Forex',kripto:'Kripto',hisse:'Hisse',emtia:'Emtia',endeks:'Endeks',opsiyon:'Opsiyon',vadeli:'Vadeli'};

  const [form,setForm]=useState(editTrade?{
    symbol:editTrade.symbol,assetType:editTrade.assetType,direction:editTrade.direction,
    entryPrice:editTrade.entryPrice?.toString()||'',exitPrice:editTrade.exitPrice?.toString()||'',
    quantity:editTrade.quantity?.toString()||'',riskAmount:editTrade.riskAmount?.toString()||'',
    commission:editTrade.commission?.toString()||'0',strategy:editTrade.strategy||'',
    notes:editTrade.notes||'',tags:editTrade.tags?.join(', ')||'',rating:editTrade.rating||3,
    entryDate:editTrade.entryDate?new Date(editTrade.entryDate).toISOString().slice(0,16):'',
    exitDate:editTrade.exitDate?new Date(editTrade.exitDate).toISOString().slice(0,16):'',
    accountId:editTrade.accountId||activeAccId||'',
    beforeLink:editTrade.beforeLink||'',afterLink:editTrade.afterLink||'',
  }:{
    symbol:'',assetType:'forex',direction:'long',entryPrice:'',exitPrice:'',quantity:'',riskAmount:'',
    commission:'0',strategy:'',notes:'',tags:'',rating:3,
    entryDate:new Date().toISOString().slice(0,16),exitDate:'',accountId:activeAccId||'',
    beforeLink:'',afterLink:'',
  });
  const [beforeImage,setBeforeImage]=useState(editTrade?.beforeImage||null);
  const [afterImage,setAfterImage]=useState(editTrade?.afterImage||null);
  const [err,setErr]=useState('');
  const beforeRef=useRef(null);
  const afterRef=useRef(null);

  const fileToBase64=(f)=>new Promise((resolve,reject)=>{
    const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(f);
  });
  const handleImage=async(file,setter)=>{
    if(!file)return;
    if(file.size>3*1024*1024){setErr('Görsel boyutu 3MB\'dan küçük olmalı.');return;}
    setter(await fileToBase64(file));setErr('');
  };

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const pnlPreview=useMemo(()=>{
    const e=parseFloat(form.entryPrice),x=parseFloat(form.exitPrice),q=parseFloat(form.quantity),c=parseFloat(form.commission)||0;
    if(!e||!x||!q)return null;
    return(x-e)*q*(form.direction==='long'?1:-1)-c;
  },[form.entryPrice,form.exitPrice,form.quantity,form.commission,form.direction]);

  const submit=(e)=>{
    e.preventDefault();setErr('');
    if(!form.symbol||!form.entryPrice||!form.quantity){setErr('Sembol, giriş fiyatı ve miktar zorunludur.');return;}
    const data={
      symbol:form.symbol.toUpperCase(),assetType:form.assetType,direction:form.direction,
      entryPrice:parseFloat(form.entryPrice),exitPrice:form.exitPrice?parseFloat(form.exitPrice):null,
      quantity:parseFloat(form.quantity),riskAmount:form.riskAmount?parseFloat(form.riskAmount):null,
      commission:parseFloat(form.commission)||0,strategy:form.strategy,notes:form.notes,
      tags:form.tags?form.tags.split(',').map(t=>t.trim()).filter(Boolean):[],
      rating:form.rating,accountId:form.accountId||null,
      entryDate:form.entryDate?new Date(form.entryDate).toISOString():new Date().toISOString(),
      exitDate:form.exitDate?new Date(form.exitDate).toISOString():null,
      beforeImage,afterImage,
      beforeLink:form.beforeLink?.trim()||null,afterLink:form.afterLink?.trim()||null,
    };
    if(editTrade){updateTrade(editTrade.id,data);}else{addTrade(data);}
    setPage('trades');
  };

  return <div>
    <div className="topbar row gap-3">
      <button className="btn btn-icon btn-subtle" onClick={()=>setPage('trades')}>{Ic.arrowLeft()}</button>
      <h2 style={{fontSize:18}}>{editTrade?'İşlemi Düzenle':'Yeni İşlem'}</h2>
    </div>
    <div className="page-wrap">
      {err&&<div style={{background:'var(--down-soft)',color:'var(--down)',padding:'10px 14px',borderRadius:'var(--r-sm)',marginBottom:16,fontSize:13}}>{err}</div>}
      <form onSubmit={submit}>
        <div className="grid-2" style={{gap:24}}>
          {/* Left */}
          <div className="card card-pad col gap-4">
            <h3>İşlem Bilgileri</h3>

            {accounts.length>0&&<div><label className="field-label">Hesap</label>
              <select value={form.accountId} onChange={e=>set('accountId',e.target.value)}>
                <option value="">Hesap Seçin</option>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </div>}

            <div className="grid-2">
              <div><label className="field-label">Sembol *</label>
                <SymbolInput value={form.symbol} onChange={v=>set('symbol',v)} onSelect={s=>set('assetType',s.t)}/>
              </div>
              <div><label className="field-label">Varlık Türü</label>
                <select value={form.assetType} onChange={e=>set('assetType',e.target.value)}>
                  {Object.entries(assetTypes).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>

            <div><label className="field-label">Yön</label>
              <div className="row gap-2">
                {['long','short'].map(d=><button key={d} type="button"
                  className={`btn grow`} style={{justifyContent:'center',
                    background:form.direction===d?(d==='long'?'var(--up-soft)':'var(--down-soft)'):'var(--bg-sunken)',
                    color:form.direction===d?(d==='long'?'var(--up)':'var(--down)'):'var(--text-muted)',
                    border:`1px solid ${form.direction===d?(d==='long'?'var(--up)':'var(--down)'):'transparent'}`
                  }} onClick={()=>set('direction',d)}>
                  {d==='long'?'↑ Long':'↓ Short'}
                </button>)}
              </div>
            </div>

            <div className="grid-2">
              <div><label className="field-label">Giriş Fiyatı *</label><input type="number" step="any" value={form.entryPrice} onChange={e=>set('entryPrice',e.target.value)} placeholder="0.00000"/></div>
              <div><label className="field-label">Çıkış Fiyatı</label><input type="number" step="any" value={form.exitPrice} onChange={e=>set('exitPrice',e.target.value)} placeholder="Boş = Açık"/></div>
            </div>

            <div className="grid-2">
              <div><label className="field-label">Miktar / Lot *</label><input type="number" step="any" value={form.quantity} onChange={e=>set('quantity',e.target.value)} placeholder="0.01"/>
                <div className="tiny mt-1">{form.assetType==='forex'?'1 Lot = 100.000 birim':form.assetType==='emtia'?'1 Lot = 10.000 birim':'Adet / Miktar'}</div>
              </div>
              <div><label className="field-label">Risk Miktarı ($)</label><input type="number" step="any" value={form.riskAmount} onChange={e=>set('riskAmount',e.target.value)} placeholder="100"/></div>
            </div>

            <div><label className="field-label">Komisyon</label><input type="number" step="any" value={form.commission} onChange={e=>set('commission',e.target.value)} placeholder="0"/></div>

            <div className="grid-2">
              <div><label className="field-label">Giriş Tarihi</label><input type="datetime-local" value={form.entryDate} onChange={e=>set('entryDate',e.target.value)}/></div>
              <div><label className="field-label">Çıkış Tarihi</label><input type="datetime-local" value={form.exitDate} onChange={e=>set('exitDate',e.target.value)}/></div>
            </div>

            {pnlPreview!==null&&<div style={{background:pnlPreview>=0?'var(--up-soft)':'var(--down-soft)',borderRadius:'var(--r-sm)',padding:'14px 16px'}}>
              <div className="tiny">Tahmini K/Z</div>
              <div className={`num font-bold ${pnlPreview>=0?'up':'down'}`} style={{fontSize:22}}>{pnlPreview>=0?'+':''}{fmtCurrency(pnlPreview)}</div>
            </div>}
          </div>

          {/* Right */}
          <div className="col gap-4">

          <div className="card card-pad col gap-4">
            <h3>Grafik Görselleri</h3>
            <p className="tiny muted" style={{marginTop:-8}}>TradingView linki veya ekran görüntüsü ekleyebilirsin.</p>
            <div className="grid-2">
              <div>
                <label className="field-label">Giriş Öncesi (Before)</label>

                {beforeImage?<div style={{position:'relative'}}>
                  <img src={beforeImage} alt="before" style={{width:'100%',height:140,objectFit:'cover',borderRadius:'var(--r-sm)',border:'1px solid var(--border)'}}/>

                  <span style={{fontSize:24}}>📷</span><span>Foto Yükle</span>
                </button>}
                <input type="url" value={form.beforeLink} onChange={e=>set('beforeLink',e.target.value)} placeholder="TradingView linki..." style={{marginTop:8,fontSize:12}}/>
              </div>
              <div>
                <label className="field-label">Çıkış Sonrası (After)</label>
                <input ref={afterRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleImage(e.target.files?.[0],setAfterImage)}/>
                {afterImage?<div style={{position:'relative'}}>
                  <img src={afterImage} alt="after" style={{width:'100%',height:140,objectFit:'cover',borderRadius:'var(--r-sm)',border:'1px solid var(--border)'}}/>
                  <button type="button" onClick={()=>{setAfterImage(null);if(afterRef.current)afterRef.current.value='';}} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,0.6)',color:'#fff',border:'none',borderRadius:'50%',width:24,height:24,cursor:'pointer',fontSize:14,lineHeight:1}}>×</button>
                </div>:<button type="button" onClick={()=>afterRef.current?.click()} style={{width:'100%',height:140,border:'2px dashed var(--border-strong)',borderRadius:'var(--r-sm)',background:'var(--bg-sunken)',color:'var(--text-muted)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,fontSize:12}}>
                  <span style={{fontSize:24}}>📷</span><span>Foto Yükle</span>
                </button>}
                <input type="url" value={form.afterLink} onChange={e=>set('afterLink',e.target.value)} placeholder="TradingView linki..." style={{marginTop:8,fontSize:12}}/>
              </div>
            </div>
          </div>

          <div className="card card-pad col gap-4">
            <h3>Journal Notları</h3>
            <div><label className="field-label">Strateji</label><input value={form.strategy} onChange={e=>set('strategy',e.target.value)} placeholder="Breakout, Trend Takip..."/></div>
            <div><label className="field-label">Notlar</label><textarea value={form.notes} onChange={e=>set('notes',e.target.value)} rows={5} placeholder="İşlem hakkında notlar..."/></div>
            <div><label className="field-label">Etiketler</label><input value={form.tags} onChange={e=>set('tags',e.target.value)} placeholder="virgülle ayırın: swing, trend, scalp"/></div>
            <div><label className="field-label">Değerlendirme</label>
              <div className="star-row">
                {[1,2,3,4,5].map(r=><span key={r} className="star" onClick={()=>set('rating',r)} style={{color:form.rating>=r?'var(--warning,#f59e0b)':'var(--border-strong)'}}>★</span>)}
              </div>
            </div>
          </div>

          </div>
        </div>

        <div className="row gap-3 mt-6" style={{justifyContent:'flex-end'}}>
          <button type="button" className="btn btn-ghost" onClick={()=>setPage('trades')}>İptal</button>
