        </div>
      </form>
    </div>
  </div>;
}

/* ===== TRADES LIST PAGE ===== */
function TradesPage({setPage,setDetailId,setEditTrade}){
  const {filteredTrades,deleteTrade,accounts,activeAccId,setActiveAccId}=useTrades();
  const [search,setSearch]=useState('');
  const [fAsset,setFAsset]=useState('');
  const [fDir,setFDir]=useState('');
  const [fStatus,setFStatus]=useState('');
  const [sortF,setSortF]=useState('entryDate');
  const [sortD,setSortD]=useState('desc');
  const [delId,setDelId]=useState(null);

  const filtered=useMemo(()=>{
    let r=[...filteredTrades];
    if(search){const q=search.toLowerCase();r=r.filter(t=>t.symbol.toLowerCase().includes(q)||t.strategy?.toLowerCase().includes(q));}
    if(fAsset)r=r.filter(t=>t.assetType===fAsset);
    if(fDir)r=r.filter(t=>t.direction===fDir);
    if(fStatus)r=r.filter(t=>t.status===fStatus);
    r.sort((a,b)=>{
      let c=0;
      if(sortF==='entryDate')c=new Date(a.entryDate)-new Date(b.entryDate);
      else if(sortF==='pnl')c=(a.pnl||0)-(b.pnl||0);
      else if(sortF==='symbol')c=a.symbol.localeCompare(b.symbol);
      return sortD==='desc'?-c:c;
    });
    return r;
  },[filteredTrades,search,fAsset,fDir,fStatus,sortF,sortD]);

  const toggle=(f)=>{if(sortF===f)setSortD(d=>d==='asc'?'desc':'asc');else{setSortF(f);setSortD('desc');}};
  const totalPnL=filtered.reduce((s,t)=>s+(t.pnl||0),0);

  return <div>
    <div className="topbar row between">
      <div><h2 style={{fontSize:18}}>İşlemler</h2><span className="tiny muted" style={{marginLeft:8}}>{filteredTrades.length} işlem</span></div>
      <button className="btn btn-primary" onClick={()=>setPage('new-trade')}>{Ic.plus(14)} Yeni İşlem</button>
    </div>
    <div className="page-wrap col gap-4">

      {accounts.length>0&&<div className="row gap-2 wrap">
        <span className={`chip ${!activeAccId?'chip-active':''}`} onClick={()=>setActiveAccId(null)}>Tüm Hesaplar</span>
        {accounts.map(a=><span key={a.id} className={`chip ${activeAccId===a.id?'chip-active':''}`} onClick={()=>setActiveAccId(activeAccId===a.id?null:a.id)}>
          <span style={{width:6,height:6,background:a.color,borderRadius:'50%',display:'inline-block'}}/>{a.name}
        </span>)}
      </div>}

      <div className="row gap-3 wrap">
        <div style={{position:'relative',flex:'1 1 200px',maxWidth:260}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{Ic.search(14)}</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sembol veya strateji ara..." style={{paddingLeft:32}}/>
        </div>
        <select value={fAsset} onChange={e=>setFAsset(e.target.value)} style={{width:'auto',minWidth:140}}>
          <option value="">Tüm Varlıklar</option>
          {['forex','kripto','hisse','emtia','endeks'].map(k=><option key={k} value={k}>{k}</option>)}
        </select>
        <select value={fDir} onChange={e=>setFDir(e.target.value)} style={{width:'auto',minWidth:120}}>
          <option value="">Tüm Yönler</option>
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{width:'auto',minWidth:130}}>
          <option value="">Tüm Durumlar</option>
          <option value="acik">Açık</option>
          <option value="kapali">Kapalı</option>
        </select>
      </div>

      <div className="row gap-4" style={{fontSize:13}}>
        <span className="muted">{filtered.length} işlem</span>
        <span className={`num font-semibold ${totalPnL>=0?'up':'down'}`}>Toplam: {totalPnL>=0?'+':''}{fmtCurrency(totalPnL)}</span>
      </div>

      <div className="card" style={{overflowX:'auto'}}>
        <table className="table">
          <thead><tr>
            <th style={{cursor:'pointer'}} onClick={()=>toggle('entryDate')}>Tarih {sortF==='entryDate'&&(sortD==='asc'?'↑':'↓')}</th>
            <th style={{cursor:'pointer'}} onClick={()=>toggle('symbol')}>Sembol {sortF==='symbol'&&(sortD==='asc'?'↑':'↓')}</th>
            {accounts.length>0&&<th>Hesap</th>}
            <th>Yön</th><th>Giriş</th><th>Çıkış</th><th>Lot</th><th>Risk</th>
            <th style={{cursor:'pointer'}} onClick={()=>toggle('pnl')}>K/Z {sortF==='pnl'&&(sortD==='asc'?'↑':'↓')}</th>
            <th>Durum</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={accounts.length>0?11:10} style={{textAlign:'center',padding:32,color:'var(--text-muted)'}}>İşlem bulunamadı.</td></tr>:
            filtered.map(t=>{
              const acc=accounts.find(a=>a.id===t.accountId);
              return <tr key={t.id} style={{cursor:'pointer'}} onClick={()=>{setDetailId(t.id);setPage('trade-detail');}}>
                <td className="tiny">{fmtShort(t.entryDate)}</td>
                <td><span style={{fontWeight:600}}>{t.symbol}</span><span className="tiny muted" style={{marginLeft:6}}>{t.assetType}</span></td>
                {accounts.length>0&&<td>{acc?<span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,padding:'2px 7px',borderRadius:999,background:acc.color+'20',color:acc.color}}><span style={{width:5,height:5,background:acc.color,borderRadius:'50%'}}/>{acc.name}</span>:<span className="tiny muted">-</span>}</td>}
                <td><span className={`chip ${t.direction==='long'?'chip-up':'chip-down'}`} style={{fontSize:11}}>{t.direction==='long'?'↑ Long':'↓ Short'}</span></td>
                <td className="num">{t.entryPrice?.toFixed(4)}</td>
                <td className="num">{t.exitPrice?.toFixed(4)||'-'}</td>
                <td className="num">{t.quantity}</td>
                <td className="num">{t.riskAmount?fmtCurrency(t.riskAmount):'-'}</td>
                <td className={`num font-semibold ${(t.pnl||0)>=0?'up':'down'}`}>{t.pnl!=null?((t.pnl>=0?'+':'')+fmtCurrency(t.pnl)):'-'}</td>
                <td><span className={`badge ${t.status==='acik'?'badge-open':'badge-neutral'}`}>{t.status==='acik'?'Açık':'Kapalı'}</span></td>
                <td onClick={e=>e.stopPropagation()} className="row gap-1">
                  <button className="btn btn-icon" style={{opacity:.5}} onClick={()=>{setEditTrade(t);setPage('new-trade');}}>{Ic.edit(13)}</button>
                  <button className="btn btn-icon" style={{opacity:.5}} onClick={()=>setDelId(t.id)}>{Ic.trash(13)}</button>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>

    {delId&&<Modal title="İşlemi Sil" onClose={()=>setDelId(null)}>
      <p style={{color:'var(--text-soft)',marginBottom:20}}>Bu işlemi silmek istediğinden emin misin?</p>
      <div className="row gap-2" style={{justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={()=>setDelId(null)}>İptal</button>
        <button className="btn btn-danger" onClick={()=>{deleteTrade(delId);setDelId(null);}}>Sil</button>
      </div>
    </Modal>}
  </div>;
}

/* ===== TRADE DETAIL PAGE ===== */
function TradeDetailPage({tradeId,setPage,setEditTrade}){
  const {trades,updateTrade,deleteTrade,accounts}=useTrades();
  const [exitPrice,setExitPrice]=useState('');
  const [exitDate,setExitDate]=useState('');
  const trade=trades.find(t=>t.id===tradeId);
  useEffect(()=>{if(trade){setExitPrice(trade.exitPrice?.toString()||'');setExitDate(trade.exitDate?new Date(trade.exitDate).toISOString().slice(0,16):'');}},[ ]);

  if(!trade)return <div className="page-wrap"><div style={{textAlign:'center',padding:48,color:'var(--text-muted)'}}>İşlem bulunamadı.</div></div>;

  const acc=accounts.find(a=>a.id===trade.accountId);
  const closeTrade=()=>{
    if(!exitPrice)return;
    updateTrade(trade.id,{exitPrice:parseFloat(exitPrice),exitDate:exitDate?new Date(exitDate).toISOString():new Date().toISOString()});
  };

  return <div>
    <div className="topbar row gap-3">
      <button className="btn btn-icon btn-subtle" onClick={()=>setPage('trades')}>{Ic.arrowLeft()}</button>
      <h2 style={{fontSize:18}}>{trade.symbol}</h2>
      <span className={`chip ${trade.direction==='long'?'chip-up':'chip-down'}`}>{trade.direction==='long'?'↑ Long':'↓ Short'}</span>
      <span className={`badge ${trade.status==='acik'?'badge-open':'badge-neutral'}`}>{trade.status==='acik'?'Açık':'Kapalı'}</span>
      <div style={{marginLeft:'auto'}} className="row gap-2">
        <button className="btn btn-ghost" onClick={()=>{setEditTrade(trade);setPage('new-trade');}}>{Ic.edit(14)} Düzenle</button>
        <button className="btn btn-danger" onClick={()=>{deleteTrade(trade.id);setPage('trades');}}>{Ic.trash(14)} Sil</button>
      </div>
    </div>
    <div className="page-wrap col gap-4">
      {trade.pnl!=null&&<div style={{background:trade.pnl>=0?'var(--up-soft)':'var(--down-soft)',borderRadius:'var(--r-md)',padding:'20px 24px'}}>
        <div className="tiny mb-1">Kar / Zarar</div>
        <div className={`num font-bold ${trade.pnl>=0?'up':'down'}`} style={{fontSize:32}}>{trade.pnl>=0?'+':''}{fmtCurrency(trade.pnl)}</div>
        {trade.pnlPct!=null&&<div className={trade.pnl>=0?'up':'down'} style={{fontSize:14,marginTop:4}}>{fmtPct(trade.pnlPct)}</div>}
      </div>}

      <div className="grid-2">
        <div className="card card-pad">
          <h4 className="mb-3">İşlem Detayları</h4>
          <div className="col gap-2">
            {[
              ['Sembol',trade.symbol],['Varlık Türü',trade.assetType],
              ['Hesap',acc?acc.name:'-'],
              ['Giriş Fiyatı',trade.entryPrice?.toFixed(5)],
              ['Çıkış Fiyatı',trade.exitPrice?.toFixed(5)||'Açık'],
              ['Miktar / Lot',trade.quantity],
              ['Risk',trade.riskAmount?fmtCurrency(trade.riskAmount):'-'],
              ['Komisyon',fmtCurrency(trade.commission||0)],
              ['Giriş Tarihi',fmtDateTime(trade.entryDate)],
              trade.exitDate&&['Çıkış Tarihi',fmtDateTime(trade.exitDate)],
            ].filter(Boolean).map(([l,v])=><div key={l} className="row between" style={{padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
              <span className="muted">{l}</span><span className="num" style={{fontWeight:500}}>{v}</span>
            </div>)}
          </div>
        </div>
        <div className="card card-pad">
          <h4 className="mb-3">Journal</h4>
          <div className="col gap-3">
            {trade.strategy&&<div><div className="tiny mb-1">Strateji</div><div style={{fontWeight:500}}>{trade.strategy}</div></div>}
            {trade.notes&&<div><div className="tiny mb-1">Notlar</div><div style={{color:'var(--text-soft)',lineHeight:1.6}}>{trade.notes}</div></div>}
            {trade.tags?.length>0&&<div><div className="tiny mb-1">Etiketler</div><div className="row gap-1 wrap">{trade.tags.map((t,i)=><span key={i} className="chip" style={{fontSize:11}}>{t}</span>)}</div></div>}
            {trade.rating&&<div><div className="tiny mb-1">Değerlendirme</div><div style={{color:'var(--warning,#f59e0b)',fontSize:18}}>{'★'.repeat(trade.rating)}{'☆'.repeat(5-trade.rating)}</div></div>}
          </div>
        </div>
      </div>

      {(trade.beforeImage||trade.afterImage||trade.beforeLink||trade.afterLink)&&<div className="card card-pad">
        <h4 className="mb-3">Grafik Görselleri</h4>
        <div className="grid-2">
          {(trade.beforeImage||trade.beforeLink)&&<div>
            <div className="tiny mb-2" style={{fontWeight:600}}>Giriş Öncesi (Before)</div>
            {trade.beforeImage&&<img src={trade.beforeImage} alt="before" style={{width:'100%',borderRadius:'var(--r-sm)',border:'1px solid var(--border)',marginBottom:8,cursor:'zoom-in'}} onClick={()=>window.open(trade.beforeImage,'_blank')}/>}
            {trade.beforeLink&&<a href={trade.beforeLink} target="_blank" rel="noopener noreferrer" className="brand" style={{fontSize:12,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}>🔗 TradingView'da Aç →</a>}
          </div>}
          {(trade.afterImage||trade.afterLink)&&<div>
            <div className="tiny mb-2" style={{fontWeight:600}}>Çıkış Sonrası (After)</div>
            {trade.afterImage&&<img src={trade.afterImage} alt="after" style={{width:'100%',borderRadius:'var(--r-sm)',border:'1px solid var(--border)',marginBottom:8,cursor:'zoom-in'}} onClick={()=>window.open(trade.afterImage,'_blank')}/>}
            {trade.afterLink&&<a href={trade.afterLink} target="_blank" rel="noopener noreferrer" className="brand" style={{fontSize:12,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}>🔗 TradingView'da Aç →</a>}
          </div>}
        </div>
      </div>}

      {trade.status==='acik'&&<div className="card card-pad" style={{borderColor:'var(--warning,#f59e0b)33'}}>
        <h4 style={{color:'var(--warning,#f59e0b)',marginBottom:16}}>İşlemi Kapat</h4>
        <div className="grid-2 mb-4">
          <div><label className="field-label">Çıkış Fiyatı</label><input type="number" step="any" value={exitPrice} onChange={e=>setExitPrice(e.target.value)} placeholder="0.00000"/></div>
          <div><label className="field-label">Çıkış Tarihi</label><input type="datetime-local" value={exitDate} onChange={e=>setExitDate(e.target.value)}/></div>
        </div>
        <button className="btn" style={{background:'rgba(245,158,11,.15)',color:'var(--warning,#f59e0b)'}} onClick={closeTrade} disabled={!exitPrice}>İşlemi Kapat</button>
      </div>}
    </div>
  </div>;
}

/* ===== PERFORMANCE PAGE ===== */
function PerfPage(){
  const {filteredTrades,accounts,activeAccId,setActiveAccId}=useTrades();
  const {user}=useAuth();
  const [period,setPeriod]=useState('aylik');

  const closed=filteredTrades.filter(t=>t.status==='kapali');
  const startBal=activeAccId?(accounts.find(a=>a.id===activeAccId)?.balance||0):(user?.settings?.startingBalance||10000);

  const metrics=useMemo(()=>{
    const wins=closed.filter(t=>(t.pnl||0)>0);
    const losses=closed.filter(t=>(t.pnl||0)<0);
    const totalPnL=closed.reduce((s,t)=>s+(t.pnl||0),0);
    const winRate=closed.length?(wins.length/closed.length)*100:0;
    const grossW=wins.reduce((s,t)=>s+(t.pnl||0),0);
    const grossL=Math.abs(losses.reduce((s,t)=>s+(t.pnl||0),0));
    const pf=grossL?grossW/grossL:grossW>0?Infinity:0;
    const avgW=wins.length?grossW/wins.length:0;
    const avgL=losses.length?grossL/losses.length:0;
    const rr=avgL?avgW/avgL:0;
    return{totalPnL,winRate,pf,avgW,avgL,rr,winsCount:wins.length,lossCount:losses.length};
  },[closed]);

  const equityCurve=useMemo(()=>{
    const sorted=[...closed].sort((a,b)=>new Date(a.exitDate||a.createdAt)-new Date(b.exitDate||b.createdAt));
    let cum=startBal;
    return sorted.map(t=>{cum+=t.pnl||0;return cum;});
  },[closed,startBal]);

  const periodData=useMemo(()=>{
    const map={};
    closed.forEach(t=>{
      const d=new Date(t.exitDate||t.createdAt);
      let key;
      if(period==='gunluk')key=d.toLocaleDateString('tr-TR');
      else if(period==='haftalik'){const wk=Math.ceil(d.getDate()/7);key=`${d.getFullYear()}-${d.getMonth()+1}W${wk}`;}
      else if(period==='aylik')key=`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
      else key=`${d.getFullYear()}`;
      if(!map[key])map[key]={key,trades:[],pnl:0,wins:0};
      map[key].trades.push(t);map[key].pnl+=t.pnl||0;if((t.pnl||0)>0)map[key].wins++;
    });
    return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
  },[closed,period]);

  return <div>
    <div className="topbar"><h2 style={{fontSize:18}}>Performans Analizi</h2></div>
    <div className="page-wrap col gap-4">
      {accounts.length>0&&<div className="row gap-2 wrap">
        <span className={`chip ${!activeAccId?'chip-active':''}`} onClick={()=>setActiveAccId(null)}>Tüm Hesaplar</span>
        {accounts.map(a=><span key={a.id} className={`chip ${activeAccId===a.id?'chip-active':''}`} onClick={()=>setActiveAccId(activeAccId===a.id?null:a.id)}>
          <span style={{width:6,height:6,background:a.color,borderRadius:'50%',display:'inline-block'}}/>{a.name}
        </span>)}
      </div>}

      <div className="grid-4">
        {[
          {l:'Toplam K/Z',v:fmtCurrency(metrics.totalPnL),pos:metrics.totalPnL>=0},
          {l:'Başarı Oranı',v:`%${metrics.winRate.toFixed(1)}`,pos:metrics.winRate>=50},
          {l:'Profit Factor',v:metrics.pf===Infinity?'∞':metrics.pf.toFixed(2),pos:metrics.pf>=1},
          {l:'Ortalama R:R',v:metrics.rr.toFixed(2),pos:metrics.rr>=1},
        ].map((k,i)=><div key={i} className="card card-pad">
          <div className="tiny mb-2">{k.l}</div>
          <div className={`num font-bold ${k.pos?'up':'down'}`} style={{fontSize:22}}>{k.v}</div>
        </div>)}
      </div>

      <div className="card card-pad">
        <h4 className="mb-3">Özsermaye Eğrisi</h4>
        <LineChart data={equityCurve} w={900} h={160} color="var(--brand)"/>
      </div>

      <div className="card card-pad">
        <div className="row between mb-3">
          <h4>Dönem Bazlı Performans</h4>
          <div className="seg">
            {['gunluk','haftalik','aylik','yillik'].map(p=><div key={p} className={`seg-item ${period===p?'active':''}`} onClick={()=>setPeriod(p)}>{p.charAt(0).toUpperCase()+p.slice(1)}</div>)}
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="table">
            <thead><tr><th>Dönem</th><th>İşlem</th><th>Kazanç</th><th>Kayıp</th><th>Başarı%</th><th>Net K/Z</th><th>En İyi</th><th>En Kötü</th></tr></thead>
            <tbody>
              {periodData.length===0?<tr><td colSpan={8} style={{textAlign:'center',padding:24,color:'var(--text-muted)'}}>Veri yok</td></tr>:
              periodData.map(s=>{
                const wr=s.trades.length?(s.wins/s.trades.length)*100:0;
                const best=Math.max(...s.trades.map(t=>t.pnl||0));
                const worst=Math.min(...s.trades.map(t=>t.pnl||0));
                return <tr key={s.key}>
                  <td style={{fontWeight:500}}>{s.key}</td>
                  <td className="num">{s.trades.length}</td>
                  <td className="num up">{s.wins}</td>
                  <td className="num down">{s.trades.length-s.wins}</td>
                  <td><span className={wr>=50?'up':'down'}>%{wr.toFixed(0)}</span></td>
                  <td className={`num font-semibold ${s.pnl>=0?'up':'down'}`}>{s.pnl>=0?'+':''}{fmtCurrency(s.pnl)}</td>
                  <td className="num up">+{fmtCurrency(best)}</td>
                  <td className="num down">{fmtCurrency(worst)}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="grid-2">
        <div className="card card-pad">
          <h4 className="mb-3">Kazanç / Kayıp Detayı</h4>
          <div className="col gap-3">
            {[
              {l:'Kazanan İşlem',v:metrics.winsCount,c:'up'},{l:'Kaybeden İşlem',v:metrics.lossCount,c:'down'},
              {l:'Ort. Kazanç',v:fmtCurrency(metrics.avgW),c:'up'},{l:'Ort. Kayıp',v:fmtCurrency(metrics.avgL),c:'down'},
            ].map(r=><div key={r.l} className="row between" style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <span className="muted">{r.l}</span><span className={`num font-semibold ${r.c}`}>{r.v}</span>
            </div>)}
          </div>
        </div>
        <div className="card card-pad">
          <h4 className="mb-3">K/Z Dağılımı</h4>
          {closed.length>0?<BarChart data={closed.sort((a,b)=>new Date(a.exitDate||a.createdAt)-new Date(b.exitDate||b.createdAt)).map(t=>({v:t.pnl||0}))} w={300} h={120}/>:
          <div className="tiny muted" style={{textAlign:'center',padding:24}}>Veri yok</div>}
        </div>
      </div>
    </div>
  </div>;
}

/* ===== JOURNAL PAGE ===== */
function JournalPage(){
  const {filteredTrades}=useTrades();
  const [showAdd,setShowAdd]=useState(false);
  const {user}=useAuth();
  const [entries,setEntries]=useState(()=>S.get(`journal_${user?.id}`,[]) );
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),mood:'notr',notes:'',lessons:''});

  const saveEntries=(e)=>{setEntries(e);S.set(`journal_${user?.id}`,e);};
  const addEntry=()=>{
    if(!form.notes.trim())return;
    saveEntries([{...form,id:uid(),createdAt:new Date().toISOString()},...entries]);
    setShowAdd(false);setForm({date:new Date().toISOString().slice(0,10),mood:'notr',notes:'',lessons:''});
  };

  const moods={harika:'🤩 Harika',iyi:'😊 İyi',notr:'😐 Nötr',kotu:'😟 Kötü',berbat:'😫 Berbat'};

  return <div>
    <div className="topbar row between">
      <h2 style={{fontSize:18}}>Günlük</h2>
      <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>{Ic.plus(14)} Giriş Ekle</button>
    </div>
    <div className="page-wrap col gap-3">
      {entries.length===0&&<div className="card card-pad" style={{textAlign:'center',padding:48,color:'var(--text-muted)'}}>Henüz günlük girişi yok.</div>}
      {entries.map(e=><div key={e.id} className="card card-pad">
        <div className="row between mb-3">
          <div className="row gap-3"><span style={{fontWeight:600}}>{fmtDate(e.date)}</span><span style={{fontSize:18}}>{moods[e.mood]||e.mood}</span></div>
          <button className="btn btn-icon" style={{opacity:.4}} onClick={()=>saveEntries(entries.filter(x=>x.id!==e.id))}>{Ic.trash(13)}</button>
        </div>
        {e.notes&&<p style={{color:'var(--text-soft)',lineHeight:1.7,marginBottom:8}}>{e.notes}</p>}
        {e.lessons&&<div style={{background:'var(--brand-soft)',borderRadius:'var(--r-sm)',padding:'10px 14px'}}><span className="tiny brand" style={{fontWeight:600}}>Dersler: </span><span style={{fontSize:13,color:'var(--text-soft)'}}>{e.lessons}</span></div>}
      </div>)}
    </div>
    {showAdd&&<Modal title="Günlük Girişi Ekle" onClose={()=>setShowAdd(false)}>
      <div className="col gap-4">
        <div className="grid-2">
          <div><label className="field-label">Tarih</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          <div><label className="field-label">Ruh Hali</label>
            <select value={form.mood} onChange={e=>setForm(p=>({...p,mood:e.target.value}))}>
              {Object.entries(moods).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>
        </div>
        <div><label className="field-label">Notlar *</label><textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={4} placeholder="Bugünün özeti..."/></div>
        <div><label className="field-label">Öğrendiklerim</label><textarea value={form.lessons} onChange={e=>setForm(p=>({...p,lessons:e.target.value}))} rows={3} placeholder="Bu günden çıkardığım dersler..."/></div>
        <div className="row gap-2" style={{justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>İptal</button>
          <button className="btn btn-primary" onClick={addEntry}>Kaydet</button>
        </div>
      </div>
    </Modal>}
  </div>;
}

/* ===== SETTINGS PAGE ===== */
function SettingsPage({darkMode,toggleDark}){
  const {user,updateUser}=useAuth();
  const [name,setName]=useState(user?.displayName||'');
  const [bal,setBal]=useState(user?.settings?.startingBalance?.toString()||'10000');
  const [saved,setSaved]=useState(false);
  const save=()=>{
    updateUser({displayName:name,settings:{startingBalance:parseFloat(bal)||10000}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  return <div>
    <div className="topbar"><h2 style={{fontSize:18}}>Ayarlar</h2></div>
    <div className="page-wrap">
      <div style={{maxWidth:560,margin:'0 auto'}} className="col gap-4">
        <div className="card card-pad col gap-4">
          <h3>Profil</h3>
          <div><label className="field-label">İsim</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
          <div><label className="field-label">E-posta</label><input value={user?.email||''} disabled style={{opacity:.5}}/></div>
          <div><label className="field-label">Başlangıç Bakiyesi ($)</label><input type="number" value={bal} onChange={e=>setBal(e.target.value)}/><div className="tiny mt-1 muted">Hesap bağlamadan bağımsız işlemler için kullanılır</div></div>
          {saved&&<div style={{background:'var(--up-soft)',color:'var(--up)',padding:'8px 12px',borderRadius:'var(--r-sm)',fontSize:13,fontWeight:500}}>✓ Ayarlar kaydedildi</div>}
          <button className="btn btn-primary" style={{alignSelf:'flex-start'}} onClick={save}>Kaydet</button>
        </div>
        <div className="card card-pad">
          <h3 className="mb-3">Görünüm</h3>
          <div className="row between">
            <div><div style={{fontWeight:500}}>Koyu Tema</div><div className="tiny muted">Karanlık renk şeması</div></div>
            <button className="btn btn-ghost" onClick={toggleDark} style={{gap:8}}>{darkMode?Ic.sun(16):Ic.moon(16)}{darkMode?'Açık Temaya Geç':'Koyu Temaya Geç'}</button>
          </div>
        </div>
        <div className="card card-pad">
          <h3 className="mb-3">Hesap Bilgileri</h3>
          <div className="col gap-2">
            <div className="row between" style={{padding:'6px 0',borderBottom:'1px solid var(--border)'}}><span className="muted">Üyelik Tarihi</span><span>{fmtDate(user?.createdAt)}</span></div>
            <div className="row between" style={{padding:'6px 0'}}><span className="muted">Kullanıcı ID</span><span className="mono" style={{fontSize:11,opacity:.5}}>{user?.id?.slice(0,8)}...</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

/* ===== MAIN APP ===== */
function App(){
  const [authPage,setAuthPage]=useState('login');
  const [page,setPage]=useState('panel');
  const [detailId,setDetailId]=useState(null);
  const [editTrade,setEditTrade]=useState(null);
  const {user,updateUser}=useAuth();
  const [darkMode,setDarkMode]=useState(()=>user?.settings?.darkMode||S.get('darkMode',false));

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',darkMode?'dark':'');
    S.set('darkMode',darkMode);
    if(user)updateUser({settings:{darkMode}});
  },[darkMode]);

  const toggleDark=()=>setDarkMode(d=>!d);

  const goPage=(p)=>{
    if(p!=='new-trade')setEditTrade(null);
    setPage(p);
  };

  if(!user){
    return authPage==='login'?<LoginPage onSwitch={()=>setAuthPage('register')}/>:<RegisterPage onSwitch={()=>setAuthPage('login')}/>;
  }

  const renderPage=()=>{
    if(page==='new-trade')return <NewTradePage setPage={goPage} editTrade={editTrade}/>;
    if(page==='trade-detail')return <TradeDetailPage tradeId={detailId} setPage={goPage} setEditTrade={setEditTrade}/>;
    if(page==='trades')return <TradesPage setPage={goPage} setDetailId={setDetailId} setEditTrade={setEditTrade}/>;
    if(page==='perf')return <PerfPage/>;
    if(page==='journal')return <JournalPage/>;
    if(page==='settings')return <SettingsPage darkMode={darkMode} toggleDark={toggleDark}/>;
    return <PanelPage setPage={goPage}/>;
  };

  return <TradeProvider>
    <div className="shell">
      <Sidebar page={page} setPage={goPage} darkMode={darkMode} toggleDark={toggleDark}/>
      <main style={{minWidth:0,overflowX:'hidden'}}>{renderPage()}</main>
    </div>
  </TradeProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><App/></AuthProvider>
);
</script>
</body>
</html>
